<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Charades!</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --pass-color: #ff2d55;
    --correct-color: #30d158;
    --timer-warn: #ff9f0a;
    --timer-danger: #ff3b30;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'Nunito', sans-serif;
    background: #1a1a2e;
    color: white;
  }

  /* ── SCREENS ── */
  .screen { display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
  .screen.active { display: flex; }

  /* ── PORTRAIT WARNING ── */
  #screen-rotate {
    background: #1a1a2e;
    flex-direction: column;
    align-items: center; justify-content: center;
    gap: 20px; text-align: center; padding: 40px;
  }
  #screen-rotate .icon { font-size: 80px; animation: rotate-hint 2s ease-in-out infinite; }
  @keyframes rotate-hint {
    0%,100% { transform: rotate(0deg); }
    50% { transform: rotate(90deg); }
  }
  #screen-rotate h2 { font-size: 1.6rem; font-family: 'Boogaloo', cursive; letter-spacing: 1px; }
  #screen-rotate p { opacity: 0.6; font-size: 0.9rem; }

  /* ── SETUP ── */
  #screen-setup {
    flex-direction: column;
    align-items: center; justify-content: flex-start;
    padding: 20px 28px;
    overflow-y: auto;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
  }
  #screen-setup h1 {
    font-family: 'Boogaloo', cursive;
    font-size: 2.8rem;
    letter-spacing: 3px;
    color: #ffd60a;
    text-shadow: 0 0 30px rgba(255,214,10,0.5);
    margin-bottom: 4px;
  }
  #screen-setup .subtitle { opacity: 0.5; font-size: 0.82rem; margin-bottom: 18px; letter-spacing: 1px; text-transform: uppercase; }

  .setup-row { width: 100%; max-width: 560px; margin-bottom: 14px; }
  .setup-row label {
    display: block; font-size: 0.75rem; text-transform: uppercase;
    letter-spacing: 1.5px; opacity: 0.6; margin-bottom: 6px;
  }
  textarea {
    width: 100%; height: 160px;
    background: rgba(255,255,255,0.06);
    border: 1.5px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    color: white; font-family: 'Nunito', sans-serif; font-size: 0.95rem;
    padding: 12px 14px; resize: none; outline: none;
    transition: border-color 0.2s;
  }
  textarea:focus { border-color: #ffd60a; }
  textarea::placeholder { opacity: 0.3; }

  .timer-row {
    display: flex; align-items: center; gap: 16px;
  }
  .timer-row input[type=range] {
    flex: 1; accent-color: #ffd60a; cursor: pointer;
  }
  .timer-val {
    font-family: 'Boogaloo', cursive;
    font-size: 1.4rem; color: #ffd60a;
    min-width: 64px; text-align: right;
  }

  .btn-start {
    margin-top: 6px;
    width: 100%; max-width: 560px;
    padding: 16px;
    background: #ffd60a;
    color: #1a1a2e;
    border: none; border-radius: 14px;
    font-family: 'Boogaloo', cursive;
    font-size: 1.6rem; letter-spacing: 2px;
    cursor: pointer;
    transition: transform 0.12s, box-shadow 0.12s;
    box-shadow: 0 6px 30px rgba(255,214,10,0.4);
  }
  .btn-start:active { transform: scale(0.97); box-shadow: 0 2px 10px rgba(255,214,10,0.3); }
  .word-count { opacity: 0.4; font-size: 0.78rem; margin-top: 8px; text-align: center; }

  /* ── TABS ── */
  .tab-bar {
    display: flex; width: 100%; max-width: 560px;
    background: rgba(255,255,255,0.06);
    border-radius: 12px; padding: 4px; gap: 4px;
    margin-bottom: 14px;
  }
  .tab-btn {
    flex: 1; padding: 9px 0;
    background: transparent; border: none; border-radius: 9px;
    color: rgba(255,255,255,0.45); font-family: 'Nunito', sans-serif;
    font-size: 0.82rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
    cursor: pointer; transition: background 0.2s, color 0.2s;
  }
  .tab-btn.active {
    background: rgba(255,255,255,0.14); color: #fff;
  }
  .tab-panel { display: none; width: 100%; max-width: 560px; }
  .tab-panel.active { display: block; }

  /* ── CATEGORY CARDS ── */
  .cat-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    margin-bottom: 4px;
  }
  .cat-card {
    background: rgba(255,255,255,0.06);
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 12px; padding: 12px 14px;
    cursor: pointer; transition: all 0.18s;
    display: flex; flex-direction: column; gap: 3px;
  }
  .cat-card:active { transform: scale(0.97); }
  .cat-card.selected {
    border-color: #ffd60a;
    background: rgba(255,214,10,0.1);
  }
  .cat-card .cat-icon { font-size: 1.4rem; }
  .cat-card .cat-name {
    font-family: 'Boogaloo', cursive; font-size: 1rem; letter-spacing: 0.5px;
  }
  .cat-card .cat-count { font-size: 0.7rem; opacity: 0.4; }
  .cat-select-hint { font-size: 0.72rem; opacity: 0.35; text-align: center; margin-top: 6px; }

  /* ── FULLSCREEN BTN ── */
  #btn-fullscreen {
    margin-top: 8px;
    width: 100%; max-width: 560px;
    padding: 11px;
    background: rgba(255,255,255,0.07);
    color: rgba(255,255,255,0.7);
    border: 1.5px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.88rem; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: background 0.2s, border-color 0.2s, color 0.2s;
  }
  #btn-fullscreen:active { background: rgba(255,255,255,0.14); }
  #btn-fullscreen.is-fullscreen {
    border-color: rgba(255,214,10,0.4);
    color: #ffd60a;
    background: rgba(255,214,10,0.08);
  }
  #btn-fullscreen .fs-icon { font-size: 1.1rem; }

  /* Small persistent fullscreen toggle during game/results */
  #btn-fs-mini {
    position: fixed; bottom: 14px; right: 14px; z-index: 100;
    width: 36px; height: 36px;
    background: rgba(0,0,0,0.35);
    border: 1.5px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    color: rgba(255,255,255,0.6);
    font-size: 1rem;
    display: none; align-items: center; justify-content: center;
    cursor: pointer;
    backdrop-filter: blur(4px);
  }
  #btn-fs-mini.visible { display: flex; }

  /* ── GAME ── */
  #screen-game {
    flex-direction: column;
    align-items: stretch; justify-content: stretch;
    position: relative; user-select: none;
  }

  /* Timer bar */
  #timer-bar-wrap {
    position: absolute; top: 0; left: 0; right: 0;
    height: 6px; background: rgba(255,255,255,0.1); z-index: 10;
  }
  #timer-bar {
    height: 100%; width: 100%;
    background: #ffd60a;
    transform-origin: left;
    transition: background 0.5s;
  }

  /* Timer number */
  #timer-num {
    position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
    font-family: 'Boogaloo', cursive; font-size: 1.5rem;
    z-index: 10; letter-spacing: 1px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.4);
    transition: color 0.3s;
  }

  /* Hit zones */
  #zone-pass, #zone-correct {
    position: absolute; top: 0; bottom: 0; width: 50%; z-index: 5;
    display: flex; align-items: center; justify-content: center;
  }
  #zone-pass { left: 0; }
  #zone-correct { right: 0; }

  .zone-hint {
    display: flex; flex-direction: column; align-items: center;
    opacity: 0.18; pointer-events: none;
    gap: 6px;
  }
  .zone-hint .arrow { font-size: 2.2rem; }
  .zone-hint span { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px; font-weight: 700; }

  /* Word display */
  #word-wrap {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    z-index: 2; pointer-events: none;
    padding: 60px 80px 20px;
  }
  #word-text {
    font-family: 'Boogaloo', cursive;
    text-align: center;
    color: white;
    text-shadow: 0 4px 20px rgba(0,0,0,0.35);
    line-height: 1.1;
    transition: font-size 0.1s;
  }

  /* Flash overlay */
  #flash {
    position: absolute; inset: 0; z-index: 20;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Boogaloo', cursive;
    font-size: 3.5rem; letter-spacing: 3px;
    opacity: 0; pointer-events: none;
    transition: none;
  }

  /* Progress dots */
  #progress {
    position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 5px; z-index: 10; max-width: 90%;
    flex-wrap: wrap; justify-content: center;
  }
  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: rgba(255,255,255,0.2);
    transition: background 0.3s;
    flex-shrink: 0;
  }
  .dot.correct { background: var(--correct-color); }
  .dot.pass { background: var(--pass-color); }
  .dot.current { background: rgba(255,255,255,0.8); }

  /* ── RESULTS ── */
  #screen-results {
    flex-direction: column;
    align-items: center; justify-content: flex-start;
    padding: 16px 20px;
    overflow-y: auto;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
  }
  #screen-results h1 {
    font-family: 'Boogaloo', cursive;
    font-size: 2.2rem; letter-spacing: 2px;
    margin-bottom: 2px;
    color: #ffd60a;
    text-shadow: 0 0 20px rgba(255,214,10,0.5);
  }
  .score-row {
    display: flex; gap: 20px; margin: 10px 0 16px;
  }
  .score-pill {
    padding: 8px 20px; border-radius: 40px;
    font-family: 'Boogaloo', cursive; font-size: 1.3rem; letter-spacing: 1px;
    display: flex; align-items: center; gap: 8px;
  }
  .score-pill.correct { background: rgba(48,209,88,0.2); border: 1.5px solid var(--correct-color); color: var(--correct-color); }
  .score-pill.pass { background: rgba(255,45,85,0.2); border: 1.5px solid var(--pass-color); color: var(--pass-color); }

  .results-cols {
    display: flex; gap: 12px; width: 100%; max-width: 640px;
  }
  .results-col {
    flex: 1; background: rgba(255,255,255,0.05);
    border-radius: 14px; padding: 12px 14px;
  }
  .results-col h3 {
    font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px;
    margin-bottom: 8px; font-weight: 700;
  }
  .results-col.correct h3 { color: var(--correct-color); }
  .results-col.pass h3 { color: var(--pass-color); }

  .result-item {
    padding: 6px 0;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    font-size: 0.9rem; line-height: 1.3;
  }
  .result-item:last-child { border-bottom: none; }

  .btn-play-again {
    margin-top: 14px;
    padding: 13px 40px;
    background: #ffd60a; color: #1a1a2e;
    border: none; border-radius: 12px;
    font-family: 'Boogaloo', cursive; font-size: 1.4rem; letter-spacing: 2px;
    cursor: pointer; box-shadow: 0 4px 20px rgba(255,214,10,0.35);
    transition: transform 0.12s;
    flex-shrink: 0;
  }
  .btn-play-again:active { transform: scale(0.97); }

  /* BG colors for game */
  .bg-1  { background: #e63946; }
  .bg-2  { background: #2a9d8f; }
  .bg-3  { background: #e76f51; }
  .bg-4  { background: #457b9d; }
  .bg-5  { background: #6a4c93; }
  .bg-6  { background: #f4a261; color: #1a1a2e !important; }
  .bg-7  { background: #2d6a4f; }
  .bg-8  { background: #c77dff; color: #1a1a2e !important; }
  .bg-9  { background: #0077b6; }
  .bg-10 { background: #d62828; }
</style>
</head>
<body>

<!-- ROTATE WARNING -->
<div class="screen" id="screen-rotate">
  <div class="icon">📱</div>
  <h2>Rotate your device!</h2>
  <p>Charades works best in landscape mode.</p>
</div>

<!-- SETUP -->
<div class="screen" id="screen-setup">
  <h1>🎭 CHARADES</h1>
  <p class="subtitle">Choose your words · Set your timer · Play!</p>

  <!-- Tab bar -->
  <div class="tab-bar">
    <button class="tab-btn active" id="tab-categories" onclick="switchTab('categories')">📦 Categories</button>
    <button class="tab-btn" id="tab-custom" onclick="switchTab('custom')">✏️ Custom List</button>
  </div>

  <!-- Categories panel -->
  <div class="tab-panel active" id="panel-categories">
    <div class="cat-grid" id="cat-grid"></div>
    <p class="cat-select-hint" id="cat-hint">Tap to select · tap again to deselect · mix &amp; match!</p>
  </div>

  <!-- Custom panel -->
  <div class="tab-panel" id="panel-custom">
    <div class="setup-row" style="margin-bottom:0">
      <label>Your word / phrase list (one per line)</label>
      <textarea id="word-input" placeholder="Dancing Queen&#10;The Eiffel Tower&#10;Spider-Man&#10;Eating spaghetti&#10;..."></textarea>
    </div>
  </div>

  <div class="setup-row" style="margin-top:14px">
    <label>Timer duration</label>
    <div class="timer-row">
      <input type="range" id="timer-range" min="30" max="300" step="15" value="120">
      <div class="timer-val"><span id="timer-display">120</span>s</div>
    </div>
  </div>

  <button class="btn-start" id="btn-start">START GAME</button>
  <button id="btn-fullscreen"><span class="fs-icon">⛶</span> <span id="fs-label">Go Fullscreen</span></button>
  <div class="word-count" id="word-count"></div>
</div>

<!-- GAME -->
<div class="screen" id="screen-game">
  <div id="timer-bar-wrap"><div id="timer-bar"></div></div>
  <div id="timer-num">—</div>

  <div id="zone-pass">
    <div class="zone-hint">
      <div class="arrow">⬅</div>
      <span>Pass</span>
    </div>
  </div>
  <div id="zone-correct">
    <div class="zone-hint">
      <div class="arrow">➡</div>
      <span>Correct</span>
    </div>
  </div>

  <div id="word-wrap">
    <div id="word-text"></div>
  </div>

  <div id="flash"></div>
  <div id="progress"></div>
</div>

<!-- RESULTS -->
<div class="screen" id="screen-results">
  <h1>🎉 Time's Up!</h1>
  <div class="score-row">
    <div class="score-pill correct">✅ <span id="score-correct">0</span> Correct</div>
    <div class="score-pill pass">❌ <span id="score-pass">0</span> Passed</div>
  </div>
  <div class="results-cols">
    <div class="results-col correct">
      <h3>✅ Guessed Correctly</h3>
      <div id="list-correct"></div>
    </div>
    <div class="results-col pass">
      <h3>❌ Passed / Skipped</h3>
      <div id="list-pass"></div>
    </div>
  </div>
  <button class="btn-play-again" id="btn-again">PLAY AGAIN</button>
</div>

<!-- Mini fullscreen toggle (game + results) -->
<button id="btn-fs-mini" title="Toggle fullscreen">⛶</button>

<script>
// ── Categories ──
const CATEGORIES = [
  {
    id: 'house', name: 'Around the House', icon: '🏠',
    words: ['Brushing teeth','Combing hair','Washing face','Tying shoes','Putting pajamas','Making bed','Sweeping floor','Dusting shelves','Washing dishes','Setting table','Cleaning windows','Folding laundry','Watering plants','Zipping jacket','Drying hair','Scrubbing floor','Vacuuming rug','Raking leaves','Wiping nose','Opening mail','Writing letter','Painting wall','Hammering nail','Hanging picture','Mop floor','Polishing shoes','Locking door','Looking through keyhole','Spraying cleaner','Checking watch']
  },
  {
    id: 'sports', name: 'Sports & Fitness', icon: '⚽',
    words: ['Shooting hoops','Kicking ball','Playing catch','Swinging bat','Bowling ball','Swimming laps','Riding bike','Jumping rope','Hula hooping','Ice skating','Roller blading','Flying kite','Playing tag','Karate chop','Archery aim','Lifting weights','Rowing boat','Fishing rod','Doing gymnastics','Pogo stick','Sliding down','Seesawing','Running fast','Playing soccer','Tennis serve','Stretching legs','Doing pushups','Riding scooter','Throwing frisbee','Climbing rope']
  },
  {
    id: 'food', name: 'Food & Cooking', icon: '🍳',
    words: ['Peeling banana','Cracking egg','Toasting bread','Flipping pancake','Eating corn','Licking lollipop','Drinking juice','Chopping carrots','Stirring soup','Peeling orange','Eating spaghetti','Baking cake','Spreading butter','Smelling cookies','Pouring milk','Eating pizza','Blowing soup','Mashing potatoes','Squeezing lemon','Opening soda','Eating popsicle','Scooping ice-cream','Shaking salt','Slicing bread','Drinking straw']
  },
  {
    id: 'hobbies', name: 'Hobbies & Play', icon: '🎮',
    words: ['Playing piano','Beating drums','Blowing bubbles','Playing trumpet','Dancing ballet','Building blocks','Playing fiddle','Blowing whistle','Popping balloon','Flying drone','Playing video-game','Reading book','Coloring picture','Cutting paper','Gluing stuff','Jigsaw puzzle','Playing cards','Toy cars','Dressing up','Finger painting','Playing flute','Taking photo','Playing guitar','Drawing heart','Watching TV']
  },
  {
    id: 'feelings', name: 'Feelings & Body', icon: '😄',
    words: ['Crying baby','Big yawn','Deep sleep','Scared face','Happy dance','Shivering cold','Sweating hot','Sneezing loud','Coughing fit','Laughing hard','Angry stomp','Thinking hard','Shushing someone','Saluting soldier','Waving hello','Blowing kiss','High five','Clapping hands','Stomping feet','Tip-toeing','Falling down','Getting up','Stretching high','Using binoculars','Taking selfie']
  },
  {
    id: 'nature', name: 'Nature & Travel', icon: '🌿',
    words: ['Rain falling','Blowing wind','Digging hole','Climbing mountain','Walking uphill','Driving car','Riding train','Paddling canoe','Picking flowers','Building snowman','Planting seeds','Watching stars','Flying plane','Crossing bridge','Splashing puddle']
  },
];

let selectedCategories = new Set();
let activeTab = 'categories';

function switchTab(tab) {
  activeTab = tab;
  document.getElementById('tab-categories').classList.toggle('active', tab === 'categories');
  document.getElementById('tab-custom').classList.toggle('active', tab === 'custom');
  document.getElementById('panel-categories').classList.toggle('active', tab === 'categories');
  document.getElementById('panel-custom').classList.toggle('active', tab === 'custom');
  updateWordCount();
}

function buildCategoryGrid() {
  const grid = document.getElementById('cat-grid');
  grid.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const card = document.createElement('div');
    card.className = 'cat-card';
    card.dataset.id = cat.id;
    card.innerHTML = `<div class="cat-icon">${cat.icon}</div><div class="cat-name">${cat.name}</div><div class="cat-count">${cat.words.length} words</div>`;
    card.addEventListener('click', () => {
      if (selectedCategories.has(cat.id)) {
        selectedCategories.delete(cat.id);
        card.classList.remove('selected');
      } else {
        selectedCategories.add(cat.id);
        card.classList.add('selected');
      }
      updateWordCount();
    });
    grid.appendChild(card);
  });
}

function getCategoryWords() {
  let all = [];
  CATEGORIES.forEach(cat => {
    if (selectedCategories.has(cat.id)) all = all.concat(cat.words);
  });
  return all;
}

// ── Audio ──
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let ctx;
function getCtx() {
  if (!ctx) ctx = new AudioCtx();
  return ctx;
}
function playTone(freq, type, duration, vol = 0.3) {
  try {
    const ac = getCtx();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type = type; osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + duration);
    osc.start(); osc.stop(ac.currentTime + duration);
  } catch(e){}
}
function soundCorrect() {
  playTone(523, 'sine', 0.12, 0.25);
  setTimeout(() => playTone(659, 'sine', 0.12, 0.25), 100);
  setTimeout(() => playTone(784, 'sine', 0.22, 0.3), 200);
}
function soundPass() {
  playTone(220, 'sawtooth', 0.18, 0.2);
  setTimeout(() => playTone(180, 'sawtooth', 0.2, 0.2), 130);
}
function soundTick() {
  playTone(880, 'square', 0.05, 0.06);
}
function soundTimeUp() {
  playTone(300, 'sawtooth', 0.08);
  setTimeout(() => playTone(260, 'sawtooth', 0.1), 120);
  setTimeout(() => playTone(220, 'sawtooth', 0.3), 280);
}

// ── State ──
let words = [], shuffled = [], idx = 0;
let timerDuration = 120, timeLeft = 0, timerInterval = null;
let results = []; // { word, result: 'correct'|'pass' }
let bgClasses = ['bg-1','bg-2','bg-3','bg-4','bg-5','bg-6','bg-7','bg-8','bg-9','bg-10'];
let currentBg = '';
let lastTick = -1;
let gameActive = false;

// ── DOM ──
const screens = {
  rotate: document.getElementById('screen-rotate'),
  setup:  document.getElementById('screen-setup'),
  game:   document.getElementById('screen-game'),
  results: document.getElementById('screen-results'),
};

function showScreen(name) {
  Object.values(screens).forEach(s => s.classList.remove('active'));
  screens[name].classList.add('active');
  updateMiniVisibility();
}

// Orientation check
function checkOrientation() {
  const isLandscape = window.innerWidth > window.innerHeight;
  const currentScreen = Object.keys(screens).find(k => screens[k].classList.contains('active')) || 'setup';
  if (!isLandscape && currentScreen !== 'rotate') {
    screens.rotate.dataset.prev = currentScreen;
    showScreen('rotate');
  } else if (isLandscape && currentScreen === 'rotate') {
    const prev = screens.rotate.dataset.prev || 'setup';
    showScreen(prev);
  }
}
window.addEventListener('resize', checkOrientation);
window.addEventListener('orientationchange', () => setTimeout(checkOrientation, 200));

// ── Setup screen ──
const timerRange = document.getElementById('timer-range');
const timerDisplay = document.getElementById('timer-display');

timerRange.addEventListener('input', () => {
  timerDisplay.textContent = timerRange.value;
});
document.getElementById('word-input').addEventListener('input', updateWordCount);

function updateWordCount() {
  const w = getWords();
  const el = document.getElementById('word-count');
  el.textContent = w.length > 0 ? `${w.length} word${w.length!==1?'s':''} ready` : '';
}

function getWords() {
  if (activeTab === 'categories') return getCategoryWords();
  return document.getElementById('word-input').value.split('\n').map(l => l.trim()).filter(Boolean);
}

document.getElementById('btn-start').addEventListener('click', () => {
  const w = getWords();
  if (w.length < 2) {
    alert(activeTab === 'categories' ? 'Select at least one category!' : 'Add at least 2 words!');
    return;
  }
  // Unlock audio on user gesture
  try { getCtx().resume(); } catch(e){}
  timerDuration = parseInt(timerRange.value);
  words = w;
  startGame();
});

// ── Shuffle ──
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ── Game ──
function startGame() {
  shuffled = shuffle(words);
  idx = 0;
  results = [];
  timeLeft = timerDuration;
  gameActive = true;
  showScreen('game');
  renderDots();
  showWord();
  startTimer();
}

function randomBg(avoid) {
  let choices = bgClasses.filter(b => b !== avoid);
  return choices[Math.floor(Math.random() * choices.length)];
}

function showWord() {
  if (idx >= shuffled.length) { endGame(); return; }
  const word = shuffled[idx];
  const bg = randomBg(currentBg);
  currentBg = bg;
  const game = screens.game;
  game.className = 'screen active ' + bg;
  const el = document.getElementById('word-text');
  el.textContent = word;
  // Auto font size
  const len = word.length;
  const fs = len <= 10 ? '3.8rem' : len <= 20 ? '2.8rem' : len <= 30 ? '2rem' : '1.5rem';
  el.style.fontSize = fs;
  updateDots();
}

function doAction(action) {
  if (!gameActive || idx >= shuffled.length) return;
  const word = shuffled[idx];
  results.push({ word, result: action });

  const flash = document.getElementById('flash');
  if (action === 'correct') {
    flash.textContent = '✅ CORRECT!';
    flash.style.background = 'rgba(48,209,88,0.88)';
    flash.style.color = '#fff';
    soundCorrect();
  } else {
    flash.textContent = '⛔ PASS';
    flash.style.background = 'rgba(255,45,85,0.88)';
    flash.style.color = '#fff';
    soundPass();
  }
  // Animate flash
  flash.style.transition = 'none';
  flash.style.opacity = '1';
  flash.style.fontSize = '3.5rem';
  setTimeout(() => {
    flash.style.transition = 'opacity 0.3s';
    flash.style.opacity = '0';
  }, 380);

  idx++;
  setTimeout(() => {
    if (idx >= shuffled.length) { endGame(); return; }
    showWord();
    updateDots();
  }, 180);
}

function updateDots() {
  const dots = document.querySelectorAll('.dot');
  dots.forEach((d, i) => {
    d.className = 'dot';
    if (i < idx) {
      d.classList.add(results[i]?.result || 'pass');
    } else if (i === idx) {
      d.classList.add('current');
    }
  });
}

function renderDots() {
  const prog = document.getElementById('progress');
  prog.innerHTML = '';
  const max = Math.min(shuffled.length, 60);
  for (let i = 0; i < max; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' current' : '');
    prog.appendChild(d);
  }
}

// ── Timer ──
function startTimer() {
  clearInterval(timerInterval);
  lastTick = -1;
  renderTimerBar();
  timerInterval = setInterval(() => {
    timeLeft--;
    renderTimerBar();
    if (timeLeft <= 10 && timeLeft !== lastTick) {
      soundTick();
      lastTick = timeLeft;
    }
    if (timeLeft <= 0) endGame();
  }, 1000);
}

function renderTimerBar() {
  const bar = document.getElementById('timer-bar');
  const num = document.getElementById('timer-num');
  const pct = Math.max(0, timeLeft / timerDuration);
  bar.style.width = (pct * 100) + '%';
  num.textContent = timeLeft + 's';
  // Color transitions
  if (pct > 0.5) {
    bar.style.background = '#ffd60a';
    num.style.color = 'rgba(255,255,255,0.9)';
  } else if (pct > 0.25) {
    bar.style.background = 'var(--timer-warn)';
    num.style.color = 'var(--timer-warn)';
  } else {
    bar.style.background = 'var(--timer-danger)';
    num.style.color = 'var(--timer-danger)';
  }
}

// ── End Game ──
function endGame() {
  clearInterval(timerInterval);
  gameActive = false;
  soundTimeUp();

  const correct = results.filter(r => r.result === 'correct');
  const passed = results.filter(r => r.result === 'pass');

  document.getElementById('score-correct').textContent = correct.length;
  document.getElementById('score-pass').textContent = passed.length;

  const listC = document.getElementById('list-correct');
  const listP = document.getElementById('list-pass');
  listC.innerHTML = correct.length ? correct.map(r => `<div class="result-item">${r.word}</div>`).join('') : '<div class="result-item" style="opacity:0.4">None</div>';
  listP.innerHTML = passed.length ? passed.map(r => `<div class="result-item">${r.word}</div>`).join('') : '<div class="result-item" style="opacity:0.4">None</div>';

  showScreen('results');
}

// ── Touch / Click zones ──
document.getElementById('zone-pass').addEventListener('click', () => doAction('pass'));
document.getElementById('zone-correct').addEventListener('click', () => doAction('correct'));

// Prevent double-tap zoom
document.getElementById('zone-pass').addEventListener('touchend', e => { e.preventDefault(); doAction('pass'); });
document.getElementById('zone-correct').addEventListener('touchend', e => { e.preventDefault(); doAction('correct'); });

// Play again
document.getElementById('btn-again').addEventListener('click', () => {
  showScreen('setup');
  updateWordCount();
});

// ── Fullscreen ──
function isFullscreen() {
  return !!(document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement);
}

function requestFullscreen() {
  const el = document.documentElement;
  const req = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen;
  if (req) req.call(el).catch(() => {});
  // Also try screen orientation lock
  try {
    if (screen.orientation && screen.orientation.lock) {
      screen.orientation.lock('landscape').catch(() => {});
    }
  } catch(e) {}
}

function exitFullscreen() {
  const ex = document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen;
  if (ex) ex.call(document).catch(() => {});
}

function toggleFullscreen() {
  if (isFullscreen()) exitFullscreen(); else requestFullscreen();
}

function updateFsButtons() {
  const fs = isFullscreen();
  const btn = document.getElementById('btn-fullscreen');
  const mini = document.getElementById('btn-fs-mini');
  const label = document.getElementById('fs-label');
  if (fs) {
    btn.classList.add('is-fullscreen');
    label.textContent = 'Exit Fullscreen';
    btn.querySelector('.fs-icon').textContent = '✕';
    mini.textContent = '⊡';
  } else {
    btn.classList.remove('is-fullscreen');
    label.textContent = 'Go Fullscreen';
    btn.querySelector('.fs-icon').textContent = '⛶';
    mini.textContent = '⛶';
  }
}

function updateMiniVisibility() {
  const mini = document.getElementById('btn-fs-mini');
  const onSetup = screens.setup.classList.contains('active');
  mini.classList.toggle('visible', !onSetup);
}

document.getElementById('btn-fullscreen').addEventListener('click', toggleFullscreen);
document.getElementById('btn-fs-mini').addEventListener('click', toggleFullscreen);
document.getElementById('btn-fs-mini').addEventListener('touchend', e => { e.preventDefault(); toggleFullscreen(); });

['fullscreenchange','webkitfullscreenchange','mozfullscreenchange'].forEach(ev => {
  document.addEventListener(ev, () => { updateFsButtons(); setTimeout(checkOrientation, 200); });
});

// ── Init ──
buildCategoryGrid();
checkOrientation();
showScreen(window.innerWidth > window.innerHeight ? 'setup' : 'rotate');
</script>
</body>
</html>
